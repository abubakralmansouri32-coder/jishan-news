backend:
  name: git-gateway
  branch: main

media_folder: static/images/uploads
public_folder: /images/uploads

collections:
    - name: posts
    label: المقالات
    folder: content/posts
    create: true
    slug: "{{slug}}"
    fields:
            - label: العنوان
        name: title
        widget: string
            - label: التاريخ
        name: date
        widget: datetime
            - label: الكاتب
        name: author
        widget: string
        default: أبوبكر المنصوري
            - label: صورة الغلاف
        name: image
        widget: image
            - label: المحتوى
        name: body
        widget: markdown
